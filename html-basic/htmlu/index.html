<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Channel Profil</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

/* navbar */
nav{
    background:#202020;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav h2{
    color:red;
}

nav input{
    padding:8px;
    width:300px;
    border-radius:20px;
    border:none;
}

/* banner */
.banner{
    width:100%;
    height:220px;
    background:url("https://via.placeholder.com/1200x220") center/cover;
}

/* profil */
.profil{
    display:flex;
    align-items:center;
    padding:20px 10%;
}

.profil img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid white;
}

.info{
    margin-left:20px;
}

.info h1{
    font-size:28px;
}

.info p{
    color:#aaa;
    margin-top:5px;
}

/* tombol */
.btn{
    margin-top:10px;
}

.btn button{
    padding:10px 18px;
    border:none;
    border-radius:20px;
    margin-right:10px;
    font-weight:bold;
}

.sub{
    background:red;
    color:white;
}

.join{
    background:#303030;
    color:white;
}

/* menu */
.menu{
    border-top:1px solid #333;
    border-bottom:1px solid #333;
    padding:15px 10%;
}

.menu a{
    margin-right:20px;
    text-decoration:none;
    color:#aaa;
}

.menu a:hover{
    color:white;
}

/* video grid */
.video{
    padding:30px 10%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#181818;
    padding:10px;
    border-radius:10px;
}

.card img{
    width:100%;
    border-radius:10px;
}

.card p{
    margin-top:8px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>YouTube</h2>
    <input type="text" placeholder="Telusuri...">
</nav>

<!-- BANNER -->
<div class="banner"></div>

<!-- PROFIL -->
<div class="profil">
    <img src="imange.jpg">
    <div class="info">
        <h1>Songep92</h1>
        <p>@turuankulon • 1 jt subscriber • 100 video</p>
        <div class="btn">
            <button class="sub">Subscribe</button>
            <button class="join">Gabung</button>
        </div>
    </div>
</div>

<!-- MENU -->
<div class="menu">
    <a href="#">Beranda</a>
    <a href="#">Video</a>
    <a href="#">Shorts</a>
    <a href="#">Live</a>
    <a href="#">Playlist</a>
</div>

<!-- VIDEO -->
<div class="video">
    <div class="card">
        <img src="https://via.placeholder.com/300x170">
        <p>Video Gaming Pertama</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x170">
        <p>Video Kedua</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x170">
        <p>Video Ketiga</p>
    </div>
</div>

</body>
</html>
