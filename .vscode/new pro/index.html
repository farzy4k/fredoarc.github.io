<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORTOFOLIO DEWA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:black;
    color:white;
    overflow-x:hidden;
}

/* RGB Background */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(45deg,red,blue,cyan,lime,yellow,pink);
    background-size:400% 400%;
    z-index:-1;
    animation:rgb 8s linear infinite;
    filter:blur(120px);
}

@keyframes rgb{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
}

nav h1{
    color:cyan;
}

nav ul{
    display:flex;
    gap:30px;
    list-style:none;
}

nav ul li{
    cursor:pointer;
}

nav ul li:hover{
    color:cyan;
}

/* Hero */
.hero{
    text-align:center;
    margin-top:120px;
}

.hero h2{
    font-size:50px;
    background:linear-gradient(90deg,cyan,pink);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    margin-top:20px;
    color:#ccc;
}

/* Card */
.container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:80px;
    flex-wrap:wrap;
}

.card{
    background:rgba(0,0,0,0.7);
    padding:30px;
    width:260px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px cyan;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.1);
    box-shadow:0 0 40px pink;
}

/* Footer */
footer{
    text-align:center;
    margin-top:80px;
    padding:20px;
    background:black;
    color:gray;
}
</style>
</head>

<body>

<nav>
<h1>MY PORTO</h1>
<ul>
<li>Home</li>
<li>Skill</li>
<li>Project</li>
<li>Contact</li>
</ul>
</nav>

<section class="hero">
<h2>WELCOME TO MY WEBSITE</h2>
<p>Web Developer • Hacker Style • Gamer RGB</p>
</section>

<div class="container">
<div class="card">
<h3>💻 Web Dev</h3>
<p>HTML CSS JS Expert</p>
</div>

<div class="card">
<h3>🎮 Gamer</h3>
<p>RGB Setup & Editing</p>
</div>

<div class="card">
<h3>⚡ Hacker</h3>
<p>Cyber Security Beginner</p>
</div>
</div>

<footer>
<p>© 2026 Portofolio Dewa SMK</p>
</footer>

</body>
</html>
